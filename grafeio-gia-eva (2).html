<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Προσωπικό Γραφείο — Ιβάν Χατσχαρτζή</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12100d;
    --card:#1e1a15;
    --bubble:#282318;
    --gold:#e8c477;
    --gold-bright:#f4d68a;
    --gold-soft:#c9a45e;
    --cream:#faf3e3;
    --muted:#b3a78f;
    --line:rgba(232,196,119,.3);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(1300px 700px at 50% -10%, rgba(232,196,119,.14), transparent 60%),
      radial-gradient(800px 500px at 100% 110%, rgba(232,196,119,.06), transparent 60%),
      var(--ink);
    color:var(--cream);
    display:flex;justify-content:center;
    min-height:100dvh;
  }
  .app{width:100%;max-width:480px;display:flex;flex-direction:column;min-height:100dvh}

  /* ---------- Intro ---------- */
  .intro{
    flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:40px 24px;
    animation:fadeIn .8s ease both;
  }
  .monogram{
    width:100px;height:100px;border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:var(--gold-bright);
    letter-spacing:2px;margin-bottom:30px;position:relative;
    box-shadow:0 0 40px rgba(232,196,119,.2);
  }
  .monogram::after{
    content:"";position:absolute;inset:-10px;border:1px solid rgba(232,196,119,.25);border-radius:50%;
  }
  .eyebrow{
    font-size:14px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);
    margin-bottom:20px;
  }
  .intro h1{
    font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(42px,11vw,56px);line-height:1.1;margin-bottom:18px;
    text-shadow:0 2px 30px rgba(232,196,119,.15);
  }
  .intro h1 em{font-style:italic;color:var(--gold-bright)}
  .intro p{
    color:var(--cream);font-size:18px;line-height:1.6;max-width:340px;margin-bottom:44px;
  }
  .btn-main{
    font-family:'Inter',sans-serif;font-size:17px;font-weight:700;letter-spacing:.04em;
    color:var(--ink);background:linear-gradient(135deg,var(--gold-bright),var(--gold-soft));
    border:none;border-radius:999px;padding:19px 46px;cursor:pointer;
    transition:transform .2s ease;
    box-shadow:0 10px 40px rgba(232,196,119,.35);
  }
  .btn-main:active{transform:scale(.97)}

  /* ---------- Chat ---------- */
  .chat-screen{display:none;flex-direction:column;flex:1;min-height:100dvh}
  .chat-header{
    position:sticky;top:0;z-index:5;
    backdrop-filter:blur(12px);background:rgba(18,16,13,.88);
    border-bottom:1px solid var(--line);
    padding:15px 20px;display:flex;align-items:center;gap:14px;
  }
  .avatar{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg,#45392a,#282318);
    border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gold-bright);
  }
  .chat-header .who{display:flex;flex-direction:column;gap:2px}
  .chat-header .name{font-size:18px;font-weight:700}
  .chat-header .status{font-size:13.5px;color:var(--gold);display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#8fc474;display:inline-block}

  .chat{flex:1;padding:24px 16px 16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
  .msg{
    max-width:86%;padding:15px 18px;border-radius:20px;
    font-size:17px;line-height:1.55;
    animation:rise .4s ease both;
  }
  .msg.eva{
    align-self:flex-start;background:var(--bubble);
    border:1px solid rgba(232,196,119,.14);
    border-bottom-left-radius:6px;
  }
  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg,var(--gold-bright),var(--gold-soft));
    color:var(--ink);font-weight:600;
    border-bottom-right-radius:6px;
  }
  .typing{
    align-self:flex-start;background:var(--bubble);border:1px solid rgba(232,196,119,.14);
    border-radius:20px;border-bottom-left-radius:6px;
    padding:16px 20px;display:flex;gap:6px;animation:rise .3s ease both;
  }
  .typing span{
    width:8px;height:8px;border-radius:50%;background:var(--gold-soft);
    animation:blink 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}

  .options{
    padding:10px 16px calc(22px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:11px;
  }
  .opt{
    font-family:'Inter',sans-serif;font-size:16.5px;font-weight:600;
    text-align:left;color:var(--cream);
    background:rgba(232,196,119,.1);
    border:1.5px solid var(--line);border-radius:16px;
    padding:16px 19px;cursor:pointer;
    transition:background .2s ease, transform .15s ease;
    animation:rise .4s ease both;
  }
  .opt:nth-child(2){animation-delay:.05s}
  .opt:nth-child(3){animation-delay:.1s}
  .opt:nth-child(4){animation-delay:.15s}
  .opt:nth-child(5){animation-delay:.2s}
  .opt:active{transform:scale(.98);background:rgba(232,196,119,.2)}

  /* ---------- Date panel ---------- */
  .date-panel{
    display:flex;flex-direction:column;gap:12px;
    background:var(--card);border:1.5px solid var(--line);border-radius:18px;
    padding:18px;animation:rise .35s ease both;
  }
  .date-label{font-size:15.5px;font-weight:600;color:var(--gold-bright)}
  .date-panel input[type="date"]{
    font-family:'Inter',sans-serif;font-size:18px;font-weight:600;
    color:var(--cream);background:rgba(232,196,119,.08);
    border:1.5px solid var(--line);border-radius:14px;
    padding:15px 16px;width:100%;
    color-scheme:dark;
  }
  .date-row{display:flex;gap:10px}
  .date-back{flex:1;text-align:center;animation:none}
  .date-ok{flex:1.4;margin-top:0;box-shadow:none}
  .date-panel textarea{
    font-family:'Inter',sans-serif;font-size:16.5px;line-height:1.5;
    color:var(--cream);background:rgba(232,196,119,.08);
    border:1.5px solid var(--line);border-radius:14px;
    padding:14px 16px;width:100%;resize:none;outline:none;
  }
  .date-panel textarea:focus{border-color:var(--gold)}
  .date-panel textarea::placeholder{color:var(--muted)}

  /* ---------- Gold confetti ---------- */
  .confetti{
    position:fixed;top:-12px;border-radius:2px;pointer-events:none;z-index:50;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(720deg); opacity:0; }
  }

  /* ---------- Final ---------- */
  .summary{
    margin:6px 0 0;align-self:stretch;
    background:var(--card);border:1.5px solid var(--line);border-radius:20px;
    padding:22px;animation:rise .5s ease both;
  }
  .summary h3{
    font-family:'Cormorant Garamond',serif;font-weight:700;font-size:26px;
    color:var(--gold-bright);margin-bottom:16px;
  }
  .summary .row{
    display:flex;flex-direction:column;gap:4px;
    padding:12px 0;border-top:1px solid rgba(232,196,119,.12);
  }
  .summary .row:first-of-type{border-top:none;padding-top:0}
  .summary .q{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-soft)}
  .summary .a{font-size:17px}
  .summary .stamp{
    margin-top:18px;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:17px;color:var(--gold);text-align:right;
  }
  .send-status{
    margin-top:14px;font-size:15px;text-align:center;color:var(--gold);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-copy{
    margin-top:12px;width:100%;
    font-size:16px;font-weight:700;color:var(--ink);
    background:linear-gradient(135deg,var(--gold-bright),var(--gold-soft));
    border:none;border-radius:14px;padding:17px;cursor:pointer;
    transition:transform .15s ease;
    box-shadow:0 8px 30px rgba(232,196,119,.25);
  }
  .btn-copy:active{transform:scale(.98)}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
<div class="app">

  <!-- INTRO -->
  <div class="intro" id="intro">
    <div class="monogram">ΙΧ</div>
    <div class="eyebrow">Προσωπικό Γραφείο</div>
    <h1>Ιβάν<br><em>Χατσχαρτζή</em></h1>
    <p>Εύα, η προσωπική γραμματέας του κυρίου Ιβάν θα ήθελε να επικοινωνήσει μαζί σας. Θα διαρκέσει λιγότερο από ένα λεπτό.</p>
    <button class="btn-main" onclick="startChat()">Είσοδος στο γραφείο</button>
  </div>

  <!-- CHAT -->
  <div class="chat-screen" id="chatScreen">
    <div class="chat-header">
      <div class="avatar">Α</div>
      <div class="who">
        <div class="name">Αθηνά</div>
        <div class="status"><span class="dot"></span>προσωπική γραμματέας</div>
      </div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="options" id="options"></div>
  </div>

</div>

<script>
/* ============ НАСТРОЙКИ (для Ивана, можно менять) ============ */
const GIRL  = "Εύα";                 // имя девушки по-гречески
const BOSS  = "Ιβάν";                // имя шефа по-гречески
const EMAIL = "ivankhachkhardzhi@gmail.com"; // сюда придут её ответы
const TG    = "";                    // или Telegram @username без собаки — для кнопки в конце
/* ============================================================= */

/* --- генерируем ближайшие 5 дней на греческом --- */
function nextDays(n){
  const out = [];
  for(let i=1;i<=n;i++){
    const d = new Date();
    d.setDate(d.getDate()+i);
    let label = d.toLocaleDateString('el-GR',{weekday:'long', day:'numeric', month:'long'});
    label = label.charAt(0).toUpperCase()+label.slice(1);
    out.push("📅 "+label);
  }
  return out;
}

const FLOW = [
  {
    eva: [
      "Καλησπέρα, " + GIRL + "! 🌸",
      "Επιτρέψτε μου να συστηθώ επίσημα: είμαι η Αθηνά, η προσωπική γραμματέας του κυρίου Ιβάν Χατσχαρτζή. Πιστεύω πως τον γνωρίζετε 😏",
      "Ο κύριος " + BOSS + " μου ανέθεσε να μάθω — πώς πάνε τα πράγματα;"
    ],
    q: "Πώς πάνε τα πράγματα",
    options: [
      { t:"📚 Διαβάζω, ετοιμάζομαι για εξετάσεις", r:"Αξιέπαινο! Ο κύριος " + BOSS + " εκτιμά τους αποφασισμένους ανθρώπους. Σημείωσα: «απασχολημένη, αλλά όχι απελπιστικά» 📝" },
      { t:"✈️ Είμαι σε ταξίδια αυτόν τον καιρό", r:"Πολύ ενδιαφέρον! Ο κύριος " + BOSS + " ζήτησε να μάθει τις συντεταγμένες σας… αστειεύομαι. Προς το παρόν 😉" },
      { t:"✨ Όλα είναι υπέροχα", r:"Υπέροχα — αυτό είναι καλό. Αλλά ο κύριος " + BOSS + " είναι σίγουρος ότι μπορούν να γίνουν ακόμα καλύτερα 😌" },
      { t:"🙃 Ειλικρινά, βαριέμαι λιγάκι", r:"Μάλιστα… Αυτή είναι πολύτιμη πληροφορία. Τη διαβιβάζω επειγόντως! 📨" }
    ]
  },
  {
    eva: [ "Επόμενη ερώτηση του ερωτηματολογίου.", "Πώς αισθάνεστε, " + GIRL + ";" ],
    q: "Διάθεση",
    options: [
      { t:"😮‍💨 Κουρασμένη, για να είμαι ειλικρινής", r:"Καταγράφηκε. Ο κύριος " + BOSS + " ήδη σκέφτεται πώς να το διορθώσει." },
      { t:"⚡ Γεμάτη ενέργεια", r:"Τέλεια! Η ενέργεια πρέπει να αξιοποιείται σωστά. Ο κύριος έχει ήδη κάποιες ιδέες 😏" },
      { t:"😐 Έτσι κι έτσι", r:"Το «έτσι κι έτσι» είναι απαράδεκτος δείκτης για μια τέτοια κοπέλα. Το αναλαμβάνουμε αμέσως." },
      { t:"🎭 Μου λείπουν οι όμορφες στιγμές", r:"Απευθυνθήκατε στο σωστό μέρος. Οι όμορφες στιγμές είναι η ειδικότητά μας." }
    ]
  },
  {
    eva: [
      "Και τώρα μια ερώτηση εκτός πρωτοκόλλου… μεταξύ μας 🤫",
      "Σας λείπει ο κύριος " + BOSS + ";"
    ],
    q: "Εκτός πρωτοκόλλου",
    options: [
      { t:"🙈 Πολύ", r:"Το ήξερα! Αλλά μην ανησυχείτε — αυτή η πληροφορία θα παραδοθεί με απόλυτη διακριτικότητα 😌" },
      { t:"😊 Λιγάκι", r:"«Λιγάκι» — καταγράφηκε. Αν και κάτι μου λέει ότι είναι παραπάνω 😏" },
      { t:"😏 Καθόλου", r:"Χμ… Η γραμματεία έχει λόγους να αμφιβάλλει για την ακρίβεια αυτής της δήλωσης 📋" },
      { t:"😇 Θα το πω μόνο στον ίδιο", r:"Σωστή στρατηγική! Σέβομαι το επαγγελματικό απόρρητο 🤝" }
    ]
  },
  {
    eva: [
      "Και τώρα το πιο σημαντικό ☝️",
      "Ο κύριος " + BOSS + " πιστεύει ότι σας αξίζει μια μικρή απόδραση. Τι θα διαλέγατε;"
    ],
    q: "Σχέδιο",
    options: [
      { t:"🚶‍♀️ Μια βόλτα", r:"Εξαιρετική επιλογή! Καθαρός αέρας και καλή παρέα — εγγυημένα." },
      { t:"☕ Καφές και κουβέντα", r:"Κλασικό και διαχρονικό. Ένα τραπέζι σε όμορφο μέρος — αρκεί ένα τηλεφώνημα του κυρίου." },
      { t:"🎬 Σινεμά", r:"Ελήφθη! Το ποπκόρν είναι προσφορά του οικοδεσπότη, εννοείται." },
      { t:"🎁 Εμπιστεύομαι την έκπληξη του " + BOSS, r:"Τολμηρή απόφαση! Σας σέβομαι. Ο κύριος " + BOSS + " δεν θα σας απογοητεύσει, σας το εγγυώμαι 💫" }
    ]
  },
  {
    eva: [
      "Υπέροχα! Ας κανονίσουμε τις λεπτομέρειες 🗓️",
      "Ποια μέρα σας βολεύει;"
    ],
    q: "Ημέρα",
    options: nextDays(5).map(d => ({ t:d, r:"Σημειώθηκε στην ατζέντα του κυρίου ✔️" }))
      .concat([{ t:"📆 Άλλη ημερομηνία…", custom:true }])
  },
  {
    eva: [ "Και τι ώρα προτιμάτε;" ],
    q: "Ώρα",
    options: [
      { t:"🌤 Μεσημέρι (13:00–15:00)", r:"Τέλεια, κλειδώθηκε 🔒" },
      { t:"☕ Απόγευμα (17:00–19:00)", r:"Τέλεια, κλειδώθηκε 🔒" },
      { t:"🌆 Βράδυ (19:00–21:00)", r:"Τέλεια, κλειδώθηκε 🔒" },
      { t:"🌙 Αργά το βράδυ (μετά τις 21:00)", r:"Α, νυχτερινός τύπος… Ο κύριος θα ενθουσιαστεί 😏 Κλειδώθηκε 🔒" }
    ]
  },
  {
    eva: [
      "Τελευταίο και προαιρετικό ✍️",
      "Θα θέλατε να αφήσετε ένα προσωπικό μήνυμα ή μια επιθυμία για τον κύριο " + BOSS + "; Θα του το διαβιβάσω αυτολεξεί — λέξη προς λέξη."
    ],
    q: "Μήνυμα για τον " + BOSS,
    input: true
  }
];

const FINAL = [
  "Σας ευχαριστώ, " + GIRL + "! Το ερωτηματολόγιο ολοκληρώθηκε ✅",
  "Σημείωσα προσεκτικά όλα όσα είπατε ✍️ Θα διαβιβάσω προσωπικά τις απαντήσεις και τις επιθυμίες σας στον κύριο " + BOSS + ".",
  "Στέλνω την επίσημη αναφορά… 📨"
];
/* =============================================================== */

const chat = document.getElementById('chat');
const optsBox = document.getElementById('options');
let step = 0;
const answers = [];

function startChat(){
  document.getElementById('intro').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  runStep();
}

function scrollDown(){ chat.scrollTop = chat.scrollHeight; window.scrollTo(0, document.body.scrollHeight); }

function addMsg(text, who){
  const d = document.createElement('div');
  d.className = 'msg ' + who;
  d.textContent = text;
  chat.appendChild(d);
  scrollDown();
}

function showTyping(){
  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(t);
  scrollDown();
  return t;
}

function evaSay(lines, then){
  let i = 0;
  function next(){
    if(i >= lines.length){ then && then(); return; }
    const t = showTyping();
    const delay = Math.min(600 + lines[i].length * 16, 1800);
    setTimeout(()=>{
      t.remove();
      addMsg(lines[i], 'eva');
      i++;
      setTimeout(next, 350);
    }, delay);
  }
  next();
}

function runStep(){
  const s = FLOW[step];
  evaSay(s.eva, ()=>{
    if(s.input){ showTextInput(s); } else { showOptions(s); }
  });
}

function showTextInput(s){
  optsBox.innerHTML = '';
  const panel = document.createElement('div');
  panel.className = 'date-panel';
  panel.innerHTML =
    '<textarea id="msgInput" rows="3" placeholder="Γράψτε εδώ το μήνυμά σας…"></textarea>' +
    '<div class="date-row">' +
      '<button class="opt date-back" id="msgSkip">Παράλειψη</button>' +
      '<button class="btn-copy date-ok" id="msgSend">Αποστολή ✍️</button>' +
    '</div>';
  optsBox.appendChild(panel);
  scrollDown();
  const input = document.getElementById('msgInput');
  setTimeout(()=>input.focus(), 100);

  document.getElementById('msgSkip').onclick = ()=>{
    pickAnswer(s, "—", "Κανένα πρόβλημα! Τα πιο σημαντικά τα έχω ήδη σημειώσει 😉");
  };
  document.getElementById('msgSend').onclick = ()=>{
    const v = input.value.trim();
    if(!v){ input.focus(); return; }
    pickAnswer(s, "💌 " + v, "Θαυμάσια! Θα το παραδώσω στον κύριο " + BOSS + " αυτολεξεί. Λέξη προς λέξη, το υπόσχομαι 🤞");
  };
}

function showOptions(s){
  optsBox.innerHTML = '';
  s.options.forEach(o=>{
    const b = document.createElement('button');
    b.className = 'opt';
    b.textContent = o.t;
    b.onclick = ()=>{
      if(o.custom){ showDatePicker(s); return; }
      pickAnswer(s, o.t, o.r);
    };
    optsBox.appendChild(b);
  });
  scrollDown();
}

function pickAnswer(s, text, reaction){
  optsBox.innerHTML = '';
  addMsg(text, 'user');
  answers.push({ q:s.q, a:text });
  evaSay([reaction], ()=>{
    step++;
    if(step < FLOW.length){ setTimeout(runStep, 450); }
    else{ finish(); }
  });
}

function showDatePicker(s){
  optsBox.innerHTML = '';
  const panel = document.createElement('div');
  panel.className = 'date-panel';

  const min = new Date(); min.setDate(min.getDate()+1);
  const max = new Date(); max.setDate(max.getDate()+90);
  const fmt = d => d.toISOString().split('T')[0];

  panel.innerHTML =
    '<div class="date-label">Διαλέξτε όποια ημερομηνία σας βολεύει 🗓️</div>' +
    '<input type="date" id="datePick" min="'+fmt(min)+'" max="'+fmt(max)+'" value="'+fmt(min)+'">' +
    '<div class="date-row">' +
      '<button class="opt date-back" id="dateBack">← Πίσω</button>' +
      '<button class="btn-copy date-ok" id="dateOk">Επιβεβαίωση ✔️</button>' +
    '</div>';
  optsBox.appendChild(panel);
  scrollDown();

  document.getElementById('dateBack').onclick = ()=> showOptions(s);
  document.getElementById('dateOk').onclick = ()=>{
    const v = document.getElementById('datePick').value;
    if(!v) return;
    const d = new Date(v + 'T12:00:00');
    let label = d.toLocaleDateString('el-GR',{weekday:'long', day:'numeric', month:'long'});
    label = label.charAt(0).toUpperCase()+label.slice(1);
    pickAnswer(s, "📅 " + label, "Εξαιρετικά! Σημειώθηκε στην ατζέντα του κυρίου ✔️");
  };
}

function buildReport(){
  return answers.map(a=>'• '+a.q+': '+a.a).join('\n');
}

async function sendEmail(statusEl){
  if(!EMAIL){ statusEl.textContent = ''; return false; }
  try{
    const body = {};
    answers.forEach(a=>{ body[a.q] = a.a; });
    body._subject = '💌 Απάντηση από την ' + GIRL + ' — ερωτηματολόγιο';
    body._template = 'table';
    body._captcha = 'false';
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 8000);
    const res = await fetch('https://formsubmit.co/ajax/' + EMAIL, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Accept':'application/json' },
      body: JSON.stringify(body),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    if(res.ok){
      statusEl.textContent = '✅ Η αναφορά παραδόθηκε στον κύριο ' + BOSS;
      return true;
    }
    throw new Error('send failed');
  }catch(e){
    statusEl.textContent = '';
    return false;
  }
}

function finish(){
  evaSay(FINAL, ()=>{
    const card = document.createElement('div');
    card.className = 'summary';
    let rows = answers.map(a=>(
      '<div class="row"><div class="q">'+a.q+'</div><div class="a">'+a.a+'</div></div>'
    )).join('');
    card.innerHTML =
      '<h3>Δελτίο απαντήσεων</h3>' + rows +
      '<div class="stamp">— καταχωρήθηκε από τη γραμματέα Αθηνά</div>' +
      '<div class="send-status" id="sendStatus">⏳ Αποστολή…</div>' +
      '<button class="btn-copy" id="copyBtn">Αποστολή στον ' + BOSS + ' 📨</button>';
    chat.appendChild(card);
    scrollDown();
    goldConfetti();

    const statusEl = document.getElementById('sendStatus');
    const btn = document.getElementById('copyBtn');

    /* кнопка работает СРАЗУ, не дожидаясь email */
    btn.onclick = ()=>{
      const text = '📋 Ερωτηματολόγιο από το γραφείο:\n' + buildReport() + '\n— γραμματέας Αθηνά ✍️';
      if(TG){
        location.href = 'https://t.me/' + TG + '?text=' + encodeURIComponent(text);
      } else if(navigator.share){
        navigator.share({ text }).catch(()=>copyFallback(text, btn));
      } else {
        copyFallback(text, btn);
      }
    };

    /* email уходит в фоне */
    sendEmail(statusEl).then(sent=>{
      if(sent){
        btn.style.display = 'none';
        evaSay(["Η αναφορά παραδόθηκε! Ο κύριος " + BOSS + " θα επικοινωνήσει μαζί σας προσωπικά πολύ σύντομα 😉"]);
      } else {
        statusEl.textContent = '';
      }
      scrollDown();
    });
  });
}

function copyFallback(text, btn){
  const done = ()=>{ btn.textContent = 'Αντιγράφηκε! Στείλτε το στον ' + BOSS + ' ✅'; };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(done).catch(()=>legacyCopy(text, done));
  } else {
    legacyCopy(text, done);
  }
}

function goldConfetti(){
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colors = ['#f4d68a','#e8c477','#c9a45e','#faf3e3'];
  for(let i=0;i<70;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    const size = 5 + Math.random()*7;
    c.style.width = size+'px';
    c.style.height = (size*0.5)+'px';
    c.style.left = (Math.random()*100)+'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2.2 + Math.random()*2.5)+'s';
    c.style.animationDelay = (Math.random()*0.9)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 6000);
  }
}

function legacyCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand('copy'); done(); }
  catch(e){ alert(text); }
  document.body.removeChild(ta);
}
</script>
